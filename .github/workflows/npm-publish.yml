name: Manual Publish

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: '选择版本更新类型 (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# 1. 必须添加权限配置，允许 GitHub 生成 OIDC ID Token
permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Project
        run: pnpm build

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump Version and Publish
        run: |
          # 更新版本
          pnpm -r exec npm version ${{ github.event.inputs.release_type }} --no-git-tag-version

          # 获取新版本号
          NEW_VERSION=$(node -p "require('./packages/signal/package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          # 2. 关键修改：发布时带上 --provenance，pnpm 会自动处理 OIDC 握手
          # 注意：不再需要传递 NPM_TOKEN 环境变量
          pnpm pub

      - name: Commit and Push Changes
        run: |
          git add .
          git commit -m "release: ${{ env.NEW_VERSION }}"
          git tag "v${{ env.NEW_VERSION }}"
          git push origin main --tags
